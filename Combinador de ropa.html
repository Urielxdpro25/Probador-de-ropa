<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Analizador de Outfits Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  <style>
    /* Estilos Generales */
    body {
      background: linear-gradient(0deg, rgba(34, 193, 195, 1) 0%, rgba(76, 194, 43, 1) 50%, rgba(253, 187, 45, 1) 100%);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
      color: #333;
      text-align: center;
    }

    /* CONTENEDOR VERTICAL */
    .container {
      max-width: 500px; /* Reducido para que se vea mejor en columna */
      margin: auto;
      display: flex;
      flex-direction: column; /* Alineación uno debajo del otro */
      gap: 15px;
      align-items: center;
    }

    .input-group {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      box-sizing: border-box;
      text-align: left;
      transition: transform 0.2s;
    }

    .input-group:hover {
      transform: translateY(-2px);
    }

    label { font-weight: bold; display: block; margin-bottom: 10px; color: #555; }
    input[type="file"] { width: 100%; font-size: 0.9em; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }

    /* Botón Animado */
    .boton { margin-top: 30px; margin-bottom: 40px; display: flex; justify-content: center; }
    .btn {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: 15rem; overflow: hidden; height: 3.5rem; cursor: pointer;
      backdrop-filter: blur(1rem); border-radius: 5rem; transition: 0.5s;
      animation: gradient_301 5s box-shadow 0.5s; border: double 4px transparent;
      background-image: linear-gradient(#212121, #212121), linear-gradient(137.48deg, #ffdb3b 10%, #fe53bb 45%, #8f51ea 67%, #0044ff 87%);
      background-origin: border-box; background-clip: content-box, border-box;
    }

    strong { z-index: 2; font-size: 14px; letter-spacing: 2px; color: #ffffff; text-shadow: 0 0 4px white; }
    #container-stars { position: absolute; z-index: -1; width: 100%; height: 100%; overflow: hidden; backdrop-filter: blur(1rem); border-radius: 5rem; }
    #stars { position: relative; background: transparent; width: 200rem; height: 200rem; }
    #stars::after { content: ""; position: absolute; top: -10rem; left: -100rem; width: 100%; height: 100%; animation: animStarRotate 90s linear infinite; background-image: radial-gradient(#ffffff 1px, transparent 1%); background-size: 50px 50px; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(254, 83, 186, 0.5); }

    /* Resultados */
    .grid-resultados { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
    .card { background: white; border-radius: 15px; padding: 20px; border-top: 8px solid #ccc; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .outfit-preview { display: flex; gap: 8px; margin-bottom: 15px; justify-content: center; align-items: center; flex-wrap: wrap; }
    .outfit-preview img { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    .score-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; margin-bottom: 10px; border: 4px solid; }

    /* Colores por puntaje */
    .sublime { border-color: #f1c40f; color: #b8860b; }
    .good { border-color: #2ecc71; color: #27ae60; }
    .neutral { border-color: #f39c12; color: #e67e22; }
    .bad { border-color: #e74c3c; color: #c0392b; }

    @keyframes animStarRotate { from { transform: rotate(360deg); } to { transform: rotate(0); } }
    @keyframes gradient_301 { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  </style>
</head>

<body>

  <h2>👗 Analizador de Estilo Inteligente</h2>
  <p style="color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">Sube tus prendas y deja que la IA cree tu look ideal.</p>

  <div class="container">
    <div class="input-group">
      <label>👕 Remera:</label>
      <input type="file" id="files1" accept="image/*" multiple>
    </div>
    <div class="input-group">
      <label>👖 Pantalon:</label>
      <input type="file" id="files2" accept="image/*" multiple>
    </div>
    <div class="input-group">
      <label>👟 Zapatillas:</label>
      <input type="file" id="files3" accept="image/*" multiple>
    </div>
    <div class="input-group">
      <label>⌚ Accesorios (Opcional):</label>
      <input type="file" id="files4" accept="image/*" multiple>
    </div>
    <div class="input-group">
      <label>🧦 Medias (Opcional):</label>
      <input type="file" id="files5" accept="image/*" multiple>
    </div>
    <div class="input-group">
      <label>🧥 Campera (Opcional):</label>
      <input type="file" id="files6" accept="image/*" multiple>
    </div>
  </div>

  <div class="boton">
    <button onclick="generarCombinaciones()" type="button" class="btn">
      <strong>GENERAR OUTFITS</strong>
      <div id="container-stars"><div id="stars"></div></div>
    </button>
  </div>

  <div id="grid-resultados" class="grid-resultados"></div>

<script>
  const colorThief = new ColorThief();

  async function generarCombinaciones() {
    const grid = document.getElementById('grid-resultados');
    const loaders = {
        f1: document.getElementById('files1').files,
        f2: document.getElementById('files2').files,
        f3: document.getElementById('files3').files,
        f4: document.getElementById('files4').files,
        f5: document.getElementById('files5').files,
        f6: document.getElementById('files6').files
    };

    if (loaders.f1.length === 0 || loaders.f2.length === 0 || loaders.f3.length === 0) {
        alert("Por favor, selecciona al menos: Prenda Superior, Inferior y Zapatillas.");
        return;
    }

    grid.innerHTML = "<div style='grid-column: 1/-1; color: white; font-weight: bold;'>⏳ Analizando colores y texturas...</div>";

    const [superiores, inferiores, zapatillas, accesorios, medias, camperas] = await Promise.all([
        procesarArchivos(loaders.f1),
        procesarArchivos(loaders.f2),
        procesarArchivos(loaders.f3),
        loaders.f4.length > 0 ? procesarArchivos(loaders.f4) : [{ src: null, color: null }],
        loaders.f5.length > 0 ? procesarArchivos(loaders.f5) : [{ src: null, color: null }],
        loaders.f6.length > 0 ? procesarArchivos(loaders.f6) : [{ src: null, color: null }]
    ]);

    let todasLasCombinaciones = [];

    superiores.forEach(sup => {
        inferiores.forEach(inf => {
            zapatillas.forEach(zap => {
                accesorios.forEach(acc => {
                    medias.forEach(med => {
                        camperas.forEach(cam => {
                            const resultado = calcularMatchPro(sup.color, inf.color, zap.color, acc.color, med.color, cam.color);
                            todasLasCombinaciones.push({
                                images: [sup.src, inf.src, zap.src, acc.src, med.src, cam.src],
                                score: resultado.score,
                                consejo: resultado.consejo
                            });
                        });
                    });
                });
            });
        });
    });

    todasLasCombinaciones.sort((a, b) => b.score - a.score);
    const mejoresVeinte = todasLasCombinaciones.slice(0, 20);

    grid.innerHTML = "";
    mejoresVeinte.forEach(c => {
        crearCard(c.images[0], c.images[1], c.images[2], c.images[3], c.images[4], c.images[5], c.score, c.consejo);
    });
  }

  async function procesarArchivos(files) {
      return Promise.all(Array.from(files).map(file => {
          return new Promise(resolve => {
              const reader = new FileReader();
              reader.onload = e => {
                  const img = new Image();
                  img.onload = () => resolve({ src: e.target.result, color: colorThief.getColor(img) });
                  img.src = e.target.result;
              };
              reader.readAsDataURL(file);
          });
      }));
  }

  function calcularMatchPro(rgbSup, rgbInf, rgbZap, rgbAcc, rgbMed, rgbCam) {
      const hSup = rgbToHsl(...rgbSup);
      const hInf = rgbToHsl(...rgbInf);
      const hZap = rgbToHsl(...rgbZap);

      let total = compararDos(hSup, hInf) + compararDos(hSup, hZap) + compararDos(hInf, hZap);
      let cantidad = 3;

      [rgbAcc, rgbMed, rgbCam].forEach(item => {
          if (item && item[0] !== null) {
              const hItem = rgbToHsl(...item);
              total += (compararDos(hSup, hItem) + compararDos(hInf, hItem)) / 2;
              cantidad++;
          }
      });

      const promedio = Math.round(total / cantidad);
      return { score: promedio, consejo: obtenerFeedback(promedio, !!rgbAcc) };
  }

  function compararDos(hsl1, hsl2) {
      const diff = Math.abs(hsl1[0] - hsl2[0]) * 360;
      if (hsl1[1] < 0.15 || hsl2[1] < 0.15) return 92; 
      if (diff < 30 || diff > 330) return 98; 
      if (diff > 160 && diff < 200) return 88; 
      return 55; 
  }

  function crearCard(img1, img2, img3, img4, img5, img6, score, consejo) {
      const grid = document.getElementById('grid-resultados');
      let clase = score > 90 ? 'sublime' : score > 80 ? 'good' : (score > 60 ? 'neutral' : 'bad');
      const renderImg = (src) => src ? `<span style="color:#aaa">+</span><img src="${src}">` : '';

      grid.innerHTML += `
          <div class="card ${clase}">
              <div class="outfit-preview">
                  <img src="${img1}"> <span>+</span>
                  <img src="${img2}"> <span>+</span>
                  <img src="${img3}">
                  ${renderImg(img4)} ${renderImg(img5)} ${renderImg(img6)}
              </div>
              <div class="score-circle ${clase}">${score}</div>
              <div style="font-size: 0.9em; font-weight: bold;">${consejo}</div>
          </div>
      `;
  }

  function obtenerFeedback(score, tieneAcc) {
      if (score > 90) return "🔥 Estilo impecable.";
      if (score > 85) return "👌 Muy buena elección.";
      if (score > 70) return "⚖️ Look equilibrado.";
      return "🤔 Podría mejorar con otros tonos.";
  }

  function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; } 
      else {
          let d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
              case r: h = (g - b) / d + (g < b ? 6 : 0); break;
              case g: h = (b - r) / d + 2; break;
              case b: h = (r - g) / d + 4; break;
          }
          h /= 6;
      }
      return [h, s, l];
  }
</script>
</body>
</html>
